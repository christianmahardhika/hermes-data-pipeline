version: "3.8"

services:
  # Graph Database (Primary Intelligence Store)
  arangodb:
    image: arangodb:3.12
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    environment:
      - ARANGO_ROOT_PASSWORD=${ARANGO_ROOT_PASSWORD:-hermes}
    restart: unless-stopped

  # Vector Database (Legacy Fallback)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  # Text Embeddings Inference
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    ports:
      - "8082:80"
    volumes:
      - tei_cache:/data
    environment:
      - MODEL_ID=intfloat/multilingual-e5-base
    command: --model-id intfloat/multilingual-e5-base
    restart: unless-stopped

  # Redis (optional - for caching/queues)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    profiles:
      - full

  # PostgreSQL (optional - for relational data)
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=hermes
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hermes}
      - POSTGRES_DB=hermes_pipelines
    restart: unless-stopped
    profiles:
      - full

volumes:
  arangodb_data:
  qdrant_data:
  tei_cache:
  redis_data:
  postgres_data:

networks:
  default:
    name: hermes-data-pipeline
